<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mark Attendance – FaceAttend AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand"><i class="fas fa-brain"></i> FaceAttend AI</div>
    <div class="nav-links">
        <a href="/"><i class="fas fa-home"></i> Home</a>
        <a href="/register"><i class="fas fa-user-plus"></i> Register</a>
        <a href="/attendance" class="active"><i class="fas fa-camera"></i> Attendance</a>
        <a href="/report"><i class="fas fa-chart-bar"></i> Report</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1><i class="fas fa-camera"></i> Mark Attendance</h1>
        <p>Start the camera and let AI automatically recognize and mark attendance.</p>
    </div>

    <div class="attendance-container">

        <!-- Camera Feed -->
        <div class="camera-panel card">
            <div class="camera-status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Camera Off</span>
            </div>

            <div class="video-wrapper large">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>

                <!-- Scanning overlay animation -->
                <div class="scan-overlay" id="scanOverlay" style="display:none;">
                    <div class="scan-beam"></div>
                    <div class="scan-label"><i class="fas fa-search"></i> Scanning...</div>
                </div>

                <!-- Face guide -->
                <div class="face-guide">
                    <div class="guide-corner tl"></div>
                    <div class="guide-corner tr"></div>
                    <div class="guide-corner bl"></div>
                    <div class="guide-corner br"></div>
                </div>
            </div>

            <div class="btn-row center">
                <button class="btn btn-primary" id="startBtn" onclick="startCamera()">
                    <i class="fas fa-video"></i> Start Camera
                </button>
                <button class="btn btn-danger" id="stopBtn" onclick="stopCamera()" style="display:none;">
                    <i class="fas fa-stop"></i> Stop Camera
                </button>
            </div>

            <!-- Live clock -->
            <div class="live-clock" id="liveClock"></div>
        </div>

        <!-- Results Panel -->
        <div class="results-panel card">
            <h3><i class="fas fa-clipboard-check"></i> Recognition Results</h3>
            <p class="muted small">Results appear here when a face is detected.</p>

            <div id="resultsList" class="results-list"></div>

            <div class="today-summary">
                <h4><i class="fas fa-calendar-check"></i> Today's Attendance</h4>
                <div id="todayList" class="today-list"><p class="muted">No attendance marked yet.</p></div>
            </div>

            <a href="/report" class="btn btn-outline btn-full" style="margin-top:1rem;">
                <i class="fas fa-chart-bar"></i> View Full Report
            </a>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
    let videoStream = null;
    let scanInterval = null;
    let isScanning = false;

    // ── Live clock ──
    function updateClock() {
        const now = new Date();
        document.getElementById("liveClock").textContent = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Start camera ──
    async function startCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById("video").srcObject = videoStream;

            // Update UI
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("stopBtn").style.display = "inline-flex";
            document.getElementById("statusDot").classList.add("active");
            document.getElementById("statusText").textContent = "Live – Scanning every 3 seconds";
            document.getElementById("scanOverlay").style.display = "flex";

            // Auto-scan every 3 seconds
            scanInterval = setInterval(scanFrame, 3000);
            scanFrame(); // Scan immediately once

        } catch(e) {
            alert("Camera error: " + e.message);
        }
    }

    // ── Stop camera ──
    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
        }
        clearInterval(scanInterval);
        document.getElementById("video").srcObject = null;
        document.getElementById("startBtn").style.display = "inline-flex";
        document.getElementById("stopBtn").style.display = "none";
        document.getElementById("statusDot").classList.remove("active");
        document.getElementById("statusText").textContent = "Camera Off";
        document.getElementById("scanOverlay").style.display = "none";
    }

    // ── Capture frame and send to API ──
    async function scanFrame() {
        if (isScanning) return;
        isScanning = true;

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        const imageData = canvas.toDataURL("image/jpeg");

        try {
            const res = await fetch("/api/recognize", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: imageData })
            });
            const data = await res.json();

            if (data.success && data.results.length > 0) {
                showResults(data.results);
                loadTodayAttendance();
            }
        } catch(e) {
            console.error("Scan error:", e);
        }

        isScanning = false;
    }

    // ── Show recognition result cards ──
    function showResults(results) {
        const list = document.getElementById("resultsList");
        list.innerHTML = "";

        results.forEach(r => {
            const isSuccess = r.status === "Marked Present";
            const isWarning = r.status === "Already Marked";
            const colorClass = isSuccess ? "success" : isWarning ? "warning" : "danger";
            const icon = isSuccess ? "check-circle" : isWarning ? "clock" : "question-circle";

            list.innerHTML += `
                <div class="result-card ${colorClass}">
                    <i class="fas fa-${icon}"></i>
                    <div>
                        <strong>${r.name}</strong>
                        <span>${r.status}</span>
                    </div>
                </div>`;
        });
    }

    // ── Load today's attendance records ──
    async function loadTodayAttendance() {
        const today = new Date().toISOString().split("T")[0];
        const res = await fetch(`/api/report?date=${today}`);
        const data = await res.json();
        const container = document.getElementById("todayList");

        if (data.records.length === 0) {
            container.innerHTML = '<p class="muted">No attendance marked yet.</p>';
        } else {
            container.innerHTML = data.records.map(r =>
                `<div class="today-item">
                    <i class="fas fa-user-check"></i>
                    <span>${r.Name}</span>
                    <span class="time-badge">${r.Time}</span>
                </div>`
            ).join("");
        }
    }

    loadTodayAttendance();
</script>
</body>
</html>
